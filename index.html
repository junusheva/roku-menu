<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roku Menu</title>
    <link rel="stylesheet" href="styles.css?v=8" />
  </head>
  <body>
    <main class="site-shell">
      <section class="poster is-home" id="menu" aria-live="polite">
        <button class="back-button" id="backButton" type="button" aria-label="Назад к меню">
          <img src="assets/back-icon.png" alt="" aria-hidden="true" draggable="false" />
        </button>

        <button class="logo-button" id="logoButton" type="button" aria-label="Главное меню">
          <img class="logo" src="assets/roku-logo.png" alt="Roku coffee and matcha bar" draggable="false" />
        </button>

        <nav class="main-view" id="mainView" aria-label="Главное меню">
          <button class="main-menu-link" type="button" data-category="toasts">ТОСТЫ</button>
          <button class="main-menu-link" type="button" data-category="breakfasts">ЗАВТРАКИ</button>
          <button class="main-menu-link" type="button" data-category="evening">ВЕЧЕРНЕЕ МЕНЮ</button>
          <button class="main-menu-link" type="button" data-category="bar">БАР</button>
          <button class="main-menu-link" type="button" data-category="cocktails">КОКТЕЙЛИ</button>
        </nav>

        <h1 id="posterTitle">ТОСТЫ</h1>

        <p class="detail-price" id="detailPrice" aria-live="polite"></p>

        <div class="menu-view" id="menuView" aria-label="Меню тостов"></div>

        <div class="detail-view" id="detailView" aria-hidden="true">
          <div class="toast-stage">
            <img
              class="detail-toast"
              id="detailImage"
              src="assets/tuna-hq.png"
              alt=""
              loading="lazy"
              decoding="async"
              draggable="false"
            />
          </div>
          <div class="callouts" id="callouts" role="list" aria-label="Ингредиенты"></div>
          <nav class="detail-navigation" aria-label="Навигация по блюдам">
            <button class="detail-arrow detail-arrow-prev" id="detailPrev" type="button" aria-label="Предыдущее блюдо">‹</button>
            <button class="detail-arrow detail-arrow-next" id="detailNext" type="button" aria-label="Следующее блюдо">›</button>
          </nav>
        </div>
      </section>
    </main>

    <script src="script.js?v=4"></script>
  </body>
</html>
